              - paragraph [ref=e57]: Velocidad de lectura y comprension lectora no tienen por que competir. En muchos casos mejoran juntas cuando el lector reduce friccion, organiza mejor el texto y decide con mas claridad cuando acelerar y cuando revisar con calma.
