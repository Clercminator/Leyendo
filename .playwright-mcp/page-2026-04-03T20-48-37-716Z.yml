            - generic [ref=e77]:
              - generic [ref=e79]:
                - heading "What reading speed means outside toy demos" [level=2] [ref=e80]
                - generic [ref=e81]:
                  - paragraph [ref=e82]: A lot of reading speed advice is measured on short snippets that are too clean to resemble real work. Reports, research papers, contracts, and study material are different. They contain headings, jargon, citations, interruptions in rhythm, and sections that deserve slower review.
                  - paragraph [ref=e83]: That means the useful question is not simply how many words per minute you can hit. The better question is whether you can move through a real document with less friction, fewer unnecessary regressions, and better control over when to speed up or slow down.
              - generic [ref=e85]:
                - heading "How to raise reading speed without losing your place" [level=2] [ref=e86]
                - generic [ref=e87]:
                  - paragraph [ref=e88]: The first improvement usually comes from reducing hesitation, not from forcing extreme speed. If you can keep visual attention moving, group words more naturally, and return to a passage without getting disoriented, your reading speed becomes more stable almost immediately.
                  - paragraph [ref=e89]: This is where document-aware reading tools matter. A clear focus mode helps you stay in motion. A phrase-based mode helps you see structure instead of isolated words. A classic mode gives full context back when the material becomes dense or technical.
                - list [ref=e90]:
                  - listitem [ref=e91]:
                    - generic [ref=e93]: Start with a pace that feels slightly ambitious, not chaotic.
                  - listitem [ref=e94]:
                    - generic [ref=e96]: Treat phrase groups as the unit of progress instead of single words.
                  - listitem [ref=e97]:
                    - generic [ref=e99]: Slow down on diagrams, formulas, and dense transitions instead of pretending every line should move at the same speed.
                  - listitem [ref=e100]:
                    - generic [ref=e102]: Use bookmarks or highlights so review is deliberate instead of anxious rereading.
              - generic [ref=e104]:
                - heading "A realistic workflow for faster reading" [level=2] [ref=e105]
                - generic [ref=e106]:
                  - paragraph [ref=e107]: A realistic reading-speed workflow has phases. First, you open the document and establish rhythm. Second, you accelerate through familiar or structurally clear material. Third, you deliberately slow down where the argument turns technical, novel, or high stakes.
                  - paragraph [ref=e108]: That sounds simple, but most generic viewers do not support it well. If every adjustment costs attention, then readers default to a flat speed and compensate with random rereading. A better workflow keeps your place, your markers, and your fallback context close by.
              - generic [ref=e110]:
                - heading "Why Leyendo targets reading speed on real documents" [level=2] [ref=e111]
                - generic [ref=e112]:
                  - paragraph [ref=e113]: Leyendo is designed around this practical version of reading speed. You can import PDFs and document files, switch views depending on the material, and keep progress tied to the document instead of losing it between sessions.
                  - paragraph [ref=e114]: That matters for search intent too. People searching reading speed often do not want theory alone. They want a way to read faster that respects comprehension, supports real files, and makes return trips easier. That is exactly the gap Leyendo is built to cover.
