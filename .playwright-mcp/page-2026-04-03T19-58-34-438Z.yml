            - generic [ref=e88]:
              - generic [ref=e89]:
                - heading "Por que comprension y velocidad suelen separarse mal" [level=2] [ref=e90]
                - generic [ref=e91]:
                  - paragraph [ref=e92]: "En muchas explicaciones populares aparece una falsa eleccion: o lees rapido o entiendes bien. Pero en la practica el problema suele ser otro. El lector pierde atencion, vuelve atras sin plan y rompe la continuidad del texto, y eso perjudica tanto la velocidad como la comprension."
                  - paragraph [ref=e93]: Cuando la lectura tiene un ritmo mas estable, la mente detecta mejor el orden del argumento. Eso facilita entender ideas principales, anticipar conexiones y recordar con mas facilidad donde estaba cada punto importante.
              - generic [ref=e94]:
                - heading "Que ayuda a mejorar comprension lectora en documentos largos" [level=2] [ref=e95]
                - generic [ref=e96]:
                  - paragraph [ref=e97]: La comprension lectora mejora cuando el texto deja de sentirse como una pared uniforme. Ver bloques, frases y transiciones ayuda a ubicar el sentido global antes de volver al detalle. Esa estructura reduce la fatiga y mejora el recuerdo.
                  - paragraph [ref=e98]: Tambien importa la posibilidad de revisar sin perderse. Si puedes guardar anclas, volver a un pasaje concreto y mantener progreso por documento, entonces la revision deja de ser una repeticion ciega y se convierte en una lectura de segunda pasada mucho mas util.
                - list [ref=e99]:
                  - listitem [ref=e100]:
                    - generic [ref=e101]: Usa una vista que te muestre estructura, no solo palabras aisladas.
                  - listitem [ref=e102]:
                    - generic [ref=e103]: Sube el ritmo de forma gradual para sostener atencion.
                  - listitem [ref=e104]:
                    - generic [ref=e105]: Marca ideas clave para una segunda lectura mas corta y precisa.
                  - listitem [ref=e106]:
                    - generic [ref=e107]: Reserva el modo mas lento para definiciones, argumentos delicados y pasajes tecnicos.
              - generic [ref=e108]:
                - heading "Como revisar sin destruir el ritmo" [level=2] [ref=e109]
                - generic [ref=e110]:
                  - paragraph [ref=e111]: Revisar bien no significa volver al inicio cada vez que algo incomoda. Una revision util tiene puntos de retorno claros. Eso permite que la primera pasada siga avanzando y que la segunda pasada sea mas precisa, mas corta y mas orientada a las secciones que realmente importan.
                  - paragraph [ref=e112]: Este detalle importa para SEO y para producto. Muchas personas que buscan comprension lectora o velocidad de lectura en realidad buscan una forma de estudiar o trabajar sin agotarse. La revision con anclas responde a esa necesidad mucho mejor que los consejos genericos.
              - generic [ref=e113]:
                - heading "Una herramienta de lectura puede unir ambas metas" [level=2] [ref=e114]
                - generic [ref=e115]:
                  - paragraph [ref=e116]: Una buena herramienta no te obliga a escoger entre velocidad de lectura y comprension lectora. Te da varias formas de leer el mismo documento segun lo que necesitas en ese momento y mantiene el estado para que el avance no se pierda.
                  - paragraph [ref=e117]: Leyendo apunta a ese equilibrio. Sirve para lectores que quieren leer mas rapido, pero tambien para quienes necesitan recordar mejor, revisar con orden y tratar documentos reales con mas respeto que el que ofrecen los visores comunes.
